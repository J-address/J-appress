# .github/workflows/ci.yml
name: Code Quality Check (CI)

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:
  lint_and_typecheck:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter @j-address/api prisma:generate

      - name: Run Linting and TypeScript Check
        run: |
          pnpm lint
          pnpm typecheck

      - name: Security Audit
        run: pnpm audit --audit-level=high

      - name: Run Unit Tests
        run: pnpm --filter @j-address/api test

      - name: Build API
        run: pnpm --filter @j-address/api build

      - name: Build Web
        run: pnpm --filter @j-address/web build
